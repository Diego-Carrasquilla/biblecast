<!DOCTYPE html>

<html class="h-full" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Playfair+Display:wght@600;700&amp;family=Work+Sans:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
        }
        .projection-canvas {
            padding: 10%; /* Adhering to the projection-margin of 10% from Style Guidance */
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .accent-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(119, 90, 25, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
        }
        .gold-border-top {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background-color: #fed488;
            opacity: 0.5;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#3f465c",
                        "on-primary-container": "#7c839b",
                        "inverse-surface": "#2d3133",
                        "outline": "#76777d",
                        "secondary-container": "#fed488",
                        "secondary-fixed": "#ffdea5",
                        "on-primary-fixed": "#131b2e",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-fixed-dim": "#e9c176",
                        "on-tertiary-fixed": "#0b1c30",
                        "outline-variant": "#c6c6cd",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#0b1c30",
                        "on-tertiary": "#ffffff",
                        "surface": "#f7f9fb",
                        "background": "#000000",
                        "secondary": "#775a19",
                        "primary": "#000000",
                        "on-surface": "#ffffff"
                    },
                    "fontFamily": {
                        "headline-lg": ["Playfair Display"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Work Sans"],
                        "display-projection": ["Playfair Display"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "display-projection": ["72px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }]
                    },
                    "spacing": {
                        "projection-margin": "10%",
                        "lg": "24px",
                        "md": "16px",
                        "sm": "8px"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface">
<!-- Subtle atmospheric background effect -->
<div class="fixed inset-0 accent-gradient pointer-events-none"></div>
<!-- Gold Ornament -->
<div class="gold-border-top"></div>
<main class="projection-canvas">
<div class="max-w-6xl w-full text-center space-y-xl">
<!-- Verse Content -->
<div class="relative">
<!-- Quotation Mark Decoration -->
<span class="absolute -top-12 -left-12 opacity-10 text-secondary-container font-display-projection text-[120px]">“</span>
<h1 class="font-display-projection text-display-projection text-secondary-fixed leading-tight tracking-tight px-lg">
                    Porque tanto amó Dios al mundo, que dio a su Hijo unigénito, para que todo el que cree en él no se pierda, sino que tenga vida eterna.
                </h1>
<span class="absolute -bottom-24 -right-12 opacity-10 text-secondary-container font-display-projection text-[120px]">”</span>
</div>
<!-- Reference Section -->
<div class="pt-xl flex flex-col items-center">
<div class="w-16 h-px bg-secondary-fixed-dim mb-md opacity-40"></div>
<p class="font-headline-md text-headline-md text-secondary-container tracking-widest uppercase">
                    Juan 3:16
                </p>
</div>
</div>
</main>
<!-- Corner Branding Decor (Minimal) -->
<div class="fixed bottom-8 right-8 opacity-20 flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-secondary-fixed">auto_awesome</span>
<span class="font-label-sm text-label-sm text-secondary-fixed tracking-[0.2em]">BIBLECAST</span>
</div>
<!-- Micro-interaction: Subtle drift of the background light -->
<script>
        document.addEventListener('mousemove', (e) => {
            const gradient = document.querySelector('.accent-gradient');
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            gradient.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(119, 90, 25, 0.12) 0%, rgba(0, 0, 0, 0) 75%)`;
        });

        // Slow automatic pulse for the background if no mouse movement
        let angle = 0;
        function animateBackground() {
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                angle += 0.005;
                const x = 50 + Math.cos(angle) * 10;
                const y = 50 + Math.sin(angle) * 10;
                const gradient = document.querySelector('.accent-gradient');
                gradient.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(119, 90, 25, 0.12) 0%, rgba(0, 0, 0, 0) 75%)`;
                requestAnimationFrame(animateBackground);
            }
        }
        animateBackground();
    </script>
</body></html>
