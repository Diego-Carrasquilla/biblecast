services:
  - type: web
    name: biblecast-signaling
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm run signaling
    healthCheckPath: /
    envVars:
      # URL del frontend en Vercel (para CORS de Socket.IO). Se rellena tras desplegar en Vercel.
      - key: CLIENT_URL
        sync: false
      # Credenciales TURN (Cloudflare Realtime, gratis y sin tarjeta). SIN esto,
      # /ice solo devuelve STUN y el casting entre redes distintas (proyector en
      # WiFi + celular en datos) NO funcionará. Crea una TURN Key en el dashboard
      # de Cloudflare (Realtime → TURN) y pega el Key ID y el API Token.
      - key: CLOUDFLARE_TURN_KEY_ID
        sync: false
      - key: CLOUDFLARE_TURN_API_TOKEN
        sync: false
